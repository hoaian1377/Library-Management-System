<!-- Modal Quên mật khẩu -->
<div id="forgot-password-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Quên mật khẩu</h2>
        </div>
        <div class="modal-body" id="forgot-step-1">
            <p style="margin-bottom: 20px; font-size: 14px; color: #555; text-align: center;">Vui lòng nhập địa chỉ email bạn đã dùng để đăng ký. Chúng tôi sẽ gửi quyền khôi phục mật khẩu cho bạn.</p>
            <form id="form-forgot-step1">
                <div class="input-group">
                    <label for="forgot-email" class="input-label">Email</label>
                    <input type="email" id="forgot-email" placeholder="Nhập email của bạn" required>
                </div>

                <div class="action-group" style="justify-content: center; margin-left: 0;">
                    <button type="submit" class="btn-login" style="width: 100%;">Xác nhận Email</button>
                </div>
            </form>
        </div>
        
        <!-- Step 2: Đặt lại mật khẩu mới (Ẩn mặc định) -->
        <div class="modal-body" id="forgot-step-2" style="display: none;">
            <p style="margin-bottom: 20px; font-size: 14px; color: #555; text-align: center;">Vui lòng nhập mật khẩu mới cho tài khoản của bạn.</p>
            <form id="form-forgot-step2">
                <div class="input-group">
                    <label for="new-password" class="input-label">Mật khẩu mới</label>
                    <input type="password" id="new-password" placeholder="Nhập mật khẩu mới" required>
                </div>
                <div class="input-group">
                    <label for="confirm-new-password" class="input-label" style="font-size: 13px;">Xác nhận MK</label>
                    <input type="password" id="confirm-new-password" placeholder="Nhập lại mật khẩu" required>
                </div>

                <div class="action-group" style="justify-content: center; margin-left: 0;">
                    <button type="submit" class="btn-login" style="width: 100%;">Xác nhận đổi mật khẩu</button>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            Nhớ ra mật khẩu rồi? <a href="#" id="back-to-login">Quay lại đăng nhập</a>
        </div>
    </div>
</div>

<script>
    const forgotPasswordModal = document.getElementById('forgot-password-modal');
    const backToLoginBtn = document.getElementById('back-to-login');
    const formForgotStep1 = document.getElementById('form-forgot-step1');
    const formForgotStep2 = document.getElementById('form-forgot-step2');
    const forgotStep1 = document.getElementById('forgot-step-1');
    const forgotStep2 = document.getElementById('forgot-step-2');

    // Submit step 1 (Email) -> Chuyển sang Step 2
    if(formForgotStep1) {
        formForgotStep1.addEventListener('submit', function(e) {
            e.preventDefault();
            // Ở đây sau này có thể thêm gọi API kiểm tra email
            forgotStep1.style.display = 'none';
            forgotStep2.style.display = 'block';
        });
    }

    // Submit step 2 (Mật khẩu mới) -> Đổi mật khẩu thành công & quay về Đăng nhập
    if(formForgotStep2) {
        formForgotStep2.addEventListener('submit', function(e) {
            e.preventDefault();
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-new-password').value;
            
            if(newPass !== confirmPass) {
                alert('Mật khẩu xác nhận không khớp. Vui lòng thử lại!');
                return;
            }

            // Thành công -> Đóng form quên mật khẩu, reset lại 2 step và mở form Đăng nhập
            alert('Đổi mật khẩu thành công! Vui lòng đăng nhập lại.');
            formForgotStep1.reset();
            formForgotStep2.reset();
            forgotStep2.style.display = 'none';
            forgotStep1.style.display = 'block';
            
            forgotPasswordModal.style.display = 'none';
            const loginM = document.getElementById('login-modal');
            if(loginM) loginM.style.display = 'flex';
        });
    }

    // Chuyển từ Quên mật khẩu về Đăng nhập
    if (backToLoginBtn) {
        backToLoginBtn.addEventListener('click', function(e) {
            e.preventDefault();
            forgotPasswordModal.style.display = 'none';
            
            // Reset lại giao diện của form Quên mật khẩu về Step 1
            if(formForgotStep1) formForgotStep1.reset();
            if(formForgotStep2) formForgotStep2.reset();
            if(forgotStep1) forgotStep1.style.display = 'block';
            if(forgotStep2) forgotStep2.style.display = 'none';

            const loginM = document.getElementById('login-modal');
            if(loginM) loginM.style.display = 'flex';
        });
    }

    // Đóng khi click ra ngoài
    window.addEventListener('click', function(e) {
        if (e.target == forgotPasswordModal) {
            forgotPasswordModal.style.display = 'none';
            // Reset lại giao diện của form Quên mật khẩu về Step 1
            if(formForgotStep1) formForgotStep1.reset();
            if(formForgotStep2) formForgotStep2.reset();
            if(forgotStep1) forgotStep1.style.display = 'block';
            if(forgotStep2) forgotStep2.style.display = 'none';
        }
    });
</script>
