<div id="forgot-password-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Quên mật khẩu</h2>
        </div>

        <div class="modal-body" id="forgot-step-1">
            <p class="modal-note">Nhập email đã đăng ký để xác minh tài khoản trước khi đặt lại mật khẩu.</p>
            <form id="form-forgot-step1" action="{% url 'forgot_password_verify' %}" method="POST">
                {% csrf_token %}
                <div id="forgot-feedback-step1" class="auth-feedback" style="display: none;"></div>
                <div class="input-group">
                    <label for="forgot-email" class="input-label">Email</label>
                    <input type="email" id="forgot-email" name="email" placeholder="Nhập email của bạn" required>
                </div>
                <div class="action-group">
                    <button type="submit" class="btn-login">Xác nhận email</button>
                </div>
            </form>
        </div>

        <div class="modal-body" id="forgot-step-2" style="display: none;">
            <p class="modal-note">Nhập mật khẩu mới cho tài khoản của bạn.</p>
            <form id="form-forgot-step2" action="{% url 'forgot_password_reset' %}" method="POST">
                {% csrf_token %}
                <input type="hidden" id="forgot-email-confirmed" name="email">
                <div id="forgot-feedback-step2" class="auth-feedback" style="display: none;"></div>
                <div class="input-group">
                    <label for="new-password" class="input-label">Mật khẩu mới</label>
                    <input type="password" id="new-password" name="new_password" placeholder="Nhập mật khẩu mới" required>
                </div>
                <div class="input-group">
                    <label for="confirm-new-password" class="input-label">Xác nhận mật khẩu</label>
                    <input type="password" id="confirm-new-password" name="confirm_password" placeholder="Nhập lại mật khẩu" required>
                </div>
                <div class="action-group">
                    <button type="submit" class="btn-login">Đổi mật khẩu</button>
                </div>
            </form>
        </div>

        <div class="modal-footer">
            Nhớ ra mật khẩu rồi? <a href="#" id="back-to-login">Quay lại đăng nhập</a>
        </div>
    </div>
</div>

<script>
    const forgotPasswordModal = document.getElementById('forgot-password-modal');
    const backToLoginBtn = document.getElementById('back-to-login');
    const formForgotStep1 = document.getElementById('form-forgot-step1');
    const formForgotStep2 = document.getElementById('form-forgot-step2');
    const forgotStep1 = document.getElementById('forgot-step-1');
    const forgotStep2 = document.getElementById('forgot-step-2');
    const forgotEmailConfirmed = document.getElementById('forgot-email-confirmed');
    const forgotFeedbackStep1 = document.getElementById('forgot-feedback-step1');
    const forgotFeedbackStep2 = document.getElementById('forgot-feedback-step2');

    if (formForgotStep1) {
        formForgotStep1.addEventListener('submit', async function (e) {
            e.preventDefault();
            forgotFeedbackStep1.style.display = 'none';
            forgotFeedbackStep1.textContent = '';
            forgotFeedbackStep1.className = 'auth-feedback';

            try {
                const response = await fetch(formForgotStep1.action, {
                    method: 'POST',
                    body: new FormData(formForgotStep1),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                const data = await response.json();

                forgotFeedbackStep1.style.display = 'block';
                forgotFeedbackStep1.textContent = data.message;
                forgotFeedbackStep1.classList.add(data.ok ? 'success' : 'error');

                if (!response.ok || !data.ok) {
                    return;
                }

                forgotEmailConfirmed.value = data.email;
                forgotStep1.style.display = 'none';
                forgotStep2.style.display = 'block';
            } catch (error) {
                forgotFeedbackStep1.style.display = 'block';
                forgotFeedbackStep1.textContent = 'Không thể xác minh email lúc này.';
                forgotFeedbackStep1.classList.add('error');
            }
        });
    }

    if (formForgotStep2) {
        formForgotStep2.addEventListener('submit', async function (e) {
            e.preventDefault();
            forgotFeedbackStep2.style.display = 'none';
            forgotFeedbackStep2.textContent = '';
            forgotFeedbackStep2.className = 'auth-feedback';

            try {
                const response = await fetch(formForgotStep2.action, {
                    method: 'POST',
                    body: new FormData(formForgotStep2),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                const data = await response.json();

                forgotFeedbackStep2.style.display = 'block';
                forgotFeedbackStep2.textContent = data.message;
                forgotFeedbackStep2.classList.add(data.ok ? 'success' : 'error');

                if (!response.ok || !data.ok) {
                    return;
                }

                formForgotStep1.reset();
                formForgotStep2.reset();
                forgotEmailConfirmed.value = '';
                forgotStep2.style.display = 'none';
                forgotStep1.style.display = 'block';

                forgotPasswordModal.style.display = 'none';
                const loginM = document.getElementById('login-modal');
                if (loginM) loginM.style.display = 'flex';
            } catch (error) {
                forgotFeedbackStep2.style.display = 'block';
                forgotFeedbackStep2.textContent = 'Không thể đổi mật khẩu lúc này.';
                forgotFeedbackStep2.classList.add('error');
            }
        });
    }

    if (backToLoginBtn) {
        backToLoginBtn.addEventListener('click', function (e) {
            e.preventDefault();
            forgotPasswordModal.style.display = 'none';

            if (formForgotStep1) formForgotStep1.reset();
            if (formForgotStep2) formForgotStep2.reset();
            if (forgotEmailConfirmed) forgotEmailConfirmed.value = '';
            if (forgotStep1) forgotStep1.style.display = 'block';
            if (forgotStep2) forgotStep2.style.display = 'none';
            if (forgotFeedbackStep1) {
                forgotFeedbackStep1.style.display = 'none';
                forgotFeedbackStep1.textContent = '';
                forgotFeedbackStep1.className = 'auth-feedback';
            }
            if (forgotFeedbackStep2) {
                forgotFeedbackStep2.style.display = 'none';
                forgotFeedbackStep2.textContent = '';
                forgotFeedbackStep2.className = 'auth-feedback';
            }

            const loginM = document.getElementById('login-modal');
            if (loginM) loginM.style.display = 'flex';
        });
    }

    window.addEventListener('click', function (e) {
        if (e.target == forgotPasswordModal) {
            forgotPasswordModal.style.display = 'none';
            if (formForgotStep1) formForgotStep1.reset();
            if (formForgotStep2) formForgotStep2.reset();
            if (forgotEmailConfirmed) forgotEmailConfirmed.value = '';
            if (forgotStep1) forgotStep1.style.display = 'block';
            if (forgotStep2) forgotStep2.style.display = 'none';
            if (forgotFeedbackStep1) {
                forgotFeedbackStep1.style.display = 'none';
                forgotFeedbackStep1.textContent = '';
                forgotFeedbackStep1.className = 'auth-feedback';
            }
            if (forgotFeedbackStep2) {
                forgotFeedbackStep2.style.display = 'none';
                forgotFeedbackStep2.textContent = '';
                forgotFeedbackStep2.className = 'auth-feedback';
            }
        }
    });
</script>
