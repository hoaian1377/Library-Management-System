<div id="login-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Đăng nhập</h2>
        </div>
        <div class="modal-body">
            <p class="modal-note">Nhập tài khoản để truy cập đúng chức năng theo vai trò của bạn.</p>
            <form action="/login/" method="POST">
                {% csrf_token %}
                <div class="input-group">
                    <label class="input-label" for="login-username">Tên đăng nhập</label>
                    <input id="login-username" type="text" name="username" required>
                </div>
                <div class="input-group">
                    <label class="input-label" for="login-password">Mật khẩu</label>
                    <input id="login-password" type="password" name="password" required>
                </div>
                <div class="remember-group">
                    <input type="checkbox" id="remember" name="remember_me">
                    <label for="remember">Ghi nhớ đăng nhập</label>
                </div>
                <div class="action-group">
                    <button type="submit" class="btn-login">Đăng nhập</button>
                    <a href="#" class="forgot-password" id="show-forgot-password">Quên mật khẩu?</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const loginModal = document.getElementById('login-modal');
    const showLoginButtons = document.querySelectorAll('[data-open-login]');
    const switchToRegisterBtn = document.getElementById('switch-to-register');
    const showForgotPasswordBtn = document.getElementById('show-forgot-password');

    showLoginButtons.forEach((button) => {
        button.addEventListener('click', function (e) {
            e.preventDefault();
            loginModal.style.display = 'flex';
        });
    });

    if (switchToRegisterBtn) {
        switchToRegisterBtn.addEventListener('click', function (e) {
            e.preventDefault();
            loginModal.style.display = 'none';
            const registerM = document.getElementById('register-modal');
            if (registerM) registerM.style.display = 'flex';
        });
    }

    if (showForgotPasswordBtn) {
        showForgotPasswordBtn.addEventListener('click', function (e) {
            e.preventDefault();
            loginModal.style.display = 'none';
            const forgotM = document.getElementById('forgot-password-modal');
            if (forgotM) forgotM.style.display = 'flex';
        });
    }

    window.addEventListener('click', function (e) {
        if (e.target == loginModal) {
            loginModal.style.display = 'none';
        }
    });
</script>
