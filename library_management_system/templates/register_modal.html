<div id="register-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Đăng ký</h2>
        </div>
        <div class="modal-body">
            <p class="modal-note">Tạo tài khoản mới. Tài khoản đăng ký sẽ mặc định ở vai trò người dùng.</p>
            <form action="{% url 'register' %}" method="POST">
                {% csrf_token %}
                <div id="register-feedback" class="auth-feedback" style="display: none;"></div>

                <div class="input-group">
                    <label for="reg-fullname" class="input-label">Họ và tên</label>
                    <input type="text" id="reg-fullname" name="full_name" placeholder="Nhập họ và tên" required>
                </div>
                <div class="input-group">
                    <label for="reg-username" class="input-label">Tên đăng nhập</label>
                    <input type="text" id="reg-username" name="username" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="input-group">
                    <label for="reg-phone" class="input-label">Điện thoại</label>
                    <input type="text" id="reg-phone" name="phone" placeholder="Nhập số điện thoại" required>
                </div>
                <div class="input-group">
                    <label for="reg-email" class="input-label">Email</label>
                    <input type="email" id="reg-email" name="email" placeholder="Nhập email" required>
                </div>
                <div class="input-group">
                    <label for="reg-password" class="input-label">Mật khẩu</label>
                    <input type="password" id="reg-password" name="password" placeholder="Nhập mật khẩu" required>
                </div>
                <div class="input-group">
                    <label for="reg-confirm-password" class="input-label">Xác nhận mật khẩu</label>
                    <input type="password" id="reg-confirm-password" name="confirm_password" placeholder="Nhập lại mật khẩu" required>
                </div>

                <div class="action-group">
                    <button type="submit" class="btn-login">Đăng ký</button>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            Đã có tài khoản? <a href="#" id="switch-to-login">Đăng nhập ngay</a>
        </div>
    </div>
</div>

<script>
    const registerModal = document.getElementById('register-modal');
    const showRegisterButtons = document.querySelectorAll('[data-open-register]');
    const switchToLoginBtn = document.getElementById('switch-to-login');

    showRegisterButtons.forEach((button) => {
        button.addEventListener('click', function (e) {
            e.preventDefault();
            const loginM = document.getElementById('login-modal');
            if (loginM) loginM.style.display = 'none';
            registerModal.style.display = 'flex';
        });
    });

    if (switchToLoginBtn) {
        switchToLoginBtn.addEventListener('click', function (e) {
            e.preventDefault();
            registerModal.style.display = 'none';
            const loginM = document.getElementById('login-modal');
            if (loginM) loginM.style.display = 'flex';
        });
    }

    const registerForm = registerModal.querySelector('form');
    const registerFeedback = document.getElementById('register-feedback');
    if (registerForm) {
        registerForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            registerFeedback.style.display = 'none';
            registerFeedback.textContent = '';
            registerFeedback.className = 'auth-feedback';

            try {
                const response = await fetch(registerForm.action, {
                    method: 'POST',
                    body: new FormData(registerForm),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                const data = await response.json();

                registerFeedback.style.display = 'block';
                registerFeedback.textContent = data.message;
                registerFeedback.classList.add(data.ok ? 'success' : 'error');

                if (!response.ok || !data.ok) {
                    return;
                }

                registerForm.reset();
                registerModal.style.display = 'none';

                const loginM = document.getElementById('login-modal');
                if (loginM) loginM.style.display = 'flex';
            } catch (error) {
                registerFeedback.style.display = 'block';
                registerFeedback.textContent = 'Không thể đăng ký lúc này. Vui lòng thử lại.';
                registerFeedback.classList.add('error');
            }
        });
    }

    window.addEventListener('click', function (e) {
        if (e.target == registerModal) {
            registerModal.style.display = 'none';
            if (registerFeedback) {
                registerFeedback.style.display = 'none';
                registerFeedback.textContent = '';
                registerFeedback.className = 'auth-feedback';
            }
        }
    });
</script>
