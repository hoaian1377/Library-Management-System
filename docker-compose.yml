services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: library-management-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Pass123"
    ports:
      - "1434:1433"

  web:
    build:
      context: .
    container_name: library-management-web
    depends_on:
      - db
    environment:
      DJANGO_SETTINGS_MODULE: library_management.settings
      DB_HOST: host.docker.internal
      DB_PORT: "1433"
      DB_NAME: QLS
      DB_USER: sa
      DB_PASSWORD: YourStrong@Pass123
      DB_DRIVER: ODBC Driver 18 for SQL Server
      DB_EXTRA_PARAMS: TrustServerCertificate=yes
    ports:
      - "8000:8000"
    volumes:
      - .:/app
